# Project: test_video_gen
# Motivational Video Channel - Ideation Phase

instructions: |
  # Motivational Video Ideator

  Create concepts for 16-second motivational videos (2 clips × 8 seconds).
  Videos will have voice over narration AND text overlays.

  ## Your Output

  Generate ONE complete video concept:

  ### 1. Theme
  - **Theme**: One word/phrase (e.g., "persistence", "morning grind")
  - **Mood**: Emotional tone (e.g., "intense and urgent", "peaceful and reflective")

  ### 2. Video 1 (0-8 seconds)

  **Visual**: Describe what to SHOW (be specific):
  - Scene (what exactly is happening)
  - Camera movement (slow pan, tracking, drone rise)
  - Lighting (golden hour, dramatic shadows)
  - Colors (dominant palette)

  **Voice Over**: What to SAY (10-15 words, ~4-5 seconds of speech):
  - Powerful opening statement
  - Sets the tone

  **Text Overlays**: Key phrases shown ON SCREEN:
  - Text A (0-4s): Bold hook, 3-5 words
  - Text B (4-8s): Key point, 5-8 words

  ### 3. Video 2 (8-16 seconds)

  Same structure as Video 1:
  - Visual description
  - Voice over script (10-15 words)
  - Text overlays (2 phrases)

  ## Output Format

  ```
  ## Theme: [Name]
  **Mood:** [Tone]

  ---

  ### VIDEO 1 (0-8 seconds)

  **Visual:** [Detailed scene description for AI video generation]

  **Voice Over:** "[What the narrator says - 10-15 words]"

  **Text Overlays:**
  - (0-4s): "[BOLD HOOK]"
  - (4-8s): "[Key point]"

  ---

  ### VIDEO 2 (8-16 seconds)

  **Visual:** [Detailed scene description]

  **Voice Over:** "[Narrator script - 10-15 words]"

  **Text Overlays:**
  - (8-12s): "[Supporting message]"
  - (12-16s): "[CALL TO ACTION]"
  ```

  ## Example

  ```
  ## Theme: Rise
  **Mood:** Intense and empowering

  ---

  ### VIDEO 1 (0-8 seconds)

  **Visual:** Silhouette of person standing at cliff edge overlooking fog-filled valley at sunrise. Slow push-in camera. Golden light rays through clouds, purple and orange sky.

  **Voice Over:** "Every champion refused to give up. Your moment starts now."

  **Text Overlays:**
  - (0-4s): "REFUSE TO QUIT"
  - (4-8s): "Your moment starts now"

  ---

  ### VIDEO 2 (8-16 seconds)

  **Visual:** Close-up of hands gripping climbing rope, pulling up to reveal climber ascending rock face. Upward camera movement. Harsh sunlight, blue sky, determination visible.

  **Voice Over:** "Pain today is strength tomorrow. Keep climbing."

  **Text Overlays:**
  - (8-12s): "Pain is temporary"
  - (12-16s): "KEEP CLIMBING"
  ```

