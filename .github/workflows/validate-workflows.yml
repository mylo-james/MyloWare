name: Validate n8n Workflows

on:
  pull_request:
    paths:
      - 'workflows/**/*.json'
      - 'scripts/validateWorkflowState.ts'
      - '.github/workflows/validate-workflows.yml'
  push:
    branches:
      - main
      - phase-*
    paths:
      - 'workflows/**/*.json'
      - 'scripts/validateWorkflowState.ts'

jobs:
  validate:
    name: Validate Workflow State Management
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate workflows
        run: npm run validate:workflows

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-validation-report
          path: docs/WORKFLOW_VALIDATION_REPORT.md
          retention-days: 30

      - name: Comment PR with validation results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('docs/WORKFLOW_VALIDATION_REPORT.md', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.name,
              body: `## ❌ Workflow Validation Failed\n\n${report}\n\n---\nPlease fix the violations and re-run validation with \`npm run validate:workflows\``
            });
