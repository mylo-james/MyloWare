name: Live Smoke (manual)

on:
  workflow_dispatch:
    inputs:
      max_wait:
        description: "Maximum wait time in seconds for video completion"
        required: false
        default: "900"

jobs:
  live-smoke:
    if: ${{ secrets.LIVE_SMOKE_ENABLED == '1' }}
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      USE_FAKE_PROVIDERS: "false"
      # Llama Stack
      LLAMA_STACK_URL: ${{ secrets.LIVE_SMOKE_LLAMA_STACK_URL }}
      TOGETHER_API_KEY: ${{ secrets.LIVE_SMOKE_TOGETHER_API_KEY }}
      # External services
      KIE_API_KEY: ${{ secrets.LIVE_SMOKE_KIE_API_KEY }}
      SHOTSTACK_API_KEY: ${{ secrets.LIVE_SMOKE_SHOTSTACK_API_KEY }}
      UPLOAD_POST_API_KEY: ${{ secrets.LIVE_SMOKE_UPLOAD_POST_API_KEY }}
      # Database
      DATABASE_URL: ${{ secrets.LIVE_SMOKE_DATABASE_URL }}
      # Auth
      API_KEY: ${{ secrets.LIVE_SMOKE_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          missing=0
          for var in LLAMA_STACK_URL TOGETHER_API_KEY KIE_API_KEY SHOTSTACK_API_KEY API_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Configure LIVE_SMOKE_* secrets (and set LIVE_SMOKE_ENABLED=1) before running this workflow."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run live smoke test
        env:
          LIVE_SMOKE_MAX_WAIT: ${{ github.event.inputs.max_wait || 900 }}
          LIVE_SMOKE_POLL_SECONDS: 10
        run: |
          pytest tests/integration/test_live_smoke.py -v --tb=short
