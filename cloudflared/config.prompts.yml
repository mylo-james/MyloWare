# Cloudflare Tunnel configuration for MCP Prompts server.
# Mirrors the local Fastify MCP endpoint on port 3456.
# Requires credentials at cloudflared/credentials/mcp-vector.json (git-ignored).
tunnel: mcp-vector
credentials-file: /etc/cloudflared/credentials/mcp-vector.json
origincert: /etc/cloudflared/cert.pem

ingressRules:
  - hostname: n8n.mjames.dev
    path: /assets/*
    caching:
      ttl: 0

ingress:
  - hostname: mcp-vector.mjames.dev
    service: http://mcp-server-dev:3456
    originRequest:
      connectTimeout: 10s
      tcpKeepAlive: 30s
      noTLSVerify: false
      disableChunkedEncoding: false
      # Ensure headers are passed through
      httpHostHeader: mcp-server-dev:3456
  - hostname: n8n.mjames.dev
    service: http://n8n:5678
    originRequest:
      connectTimeout: 10s
      tcpKeepAlive: 30s
  - service: http_status:404
