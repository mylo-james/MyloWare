services:
  postgres:
    image: ankane/pgvector:latest
    container_name: mcp-prompts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MCP_DB_USER:-mcp_prompts}
      POSTGRES_PASSWORD: ${MCP_DB_PASSWORD:-mcp_prompts}
      POSTGRES_DB: ${MCP_DB_NAME:-mcp_prompts}
    ports:
    - 5442:5432
    volumes:
    - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -d $${POSTGRES_DB:-mcp_prompts} -U $${POSTGRES_USER:-mcp_prompts}
      interval: 10s
      timeout: 5s
      retries: 5
  server-prod:
    profiles:
    - prod
    build:
      context: .
      target: prod
    container_name: mcp-prompts-server
    restart: unless-stopped
    env_file:
    - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://mcp_prompts:mcp_prompts@postgres:5432/mcp_prompts
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3456
    depends_on:
      postgres:
        condition: service_healthy
    ports:
    - 3456:3456
  server-dev:
    profiles:
    - dev
    build:
      context: .
      target: dev
    container_name: mcp-prompts-server-dev
    restart: unless-stopped
    working_dir: /app
    command: npm run dev
    env_file:
    - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://mcp_prompts:mcp_prompts@postgres:5432/mcp_prompts
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3456
    volumes:
    - ./src:/app/src
    - ./scripts:/app/scripts
    - ./tsconfig.json:/app/tsconfig.json
    - ./package.json:/app/package.json
    - ./package-lock.json:/app/package-lock.json
    - ./vitest.config.ts:/app/vitest.config.ts
    - ..:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
    - 3456:3456
  cloudflared-prod:
    profiles:
    - prod
    image: cloudflare/cloudflared:latest
    container_name: mcp-prompts-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.prompts.yml run
    volumes:
    - ./cloudflared/config.prompts.yml:/etc/cloudflared/config.prompts.yml:ro
    - ./cloudflared/credentials:/etc/cloudflared/credentials:ro
    - ./cloudflared/cert.pem:/etc/cloudflared/cert.pem:ro
    depends_on:
      server-prod:
        condition: service_started
  cloudflared-dev:
    profiles:
    - dev
    image: cloudflare/cloudflared:latest
    container_name: mcp-prompts-cloudflared-dev
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.prompts.yml run
    volumes:
    - ./cloudflared/config.prompts.yml:/etc/cloudflared/config.prompts.yml:ro
    - ./cloudflared/credentials:/etc/cloudflared/credentials:ro
    - ./cloudflared/cert.pem:/etc/cloudflared/cert.pem:ro
    depends_on:
      server-dev:
        condition: service_started
volumes:
  postgres-data:
    driver: local
