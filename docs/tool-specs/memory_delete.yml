tool:
  id: myloware.memory.memory_delete.v1
  name: memory_delete
  namespace: myloware.memory
  version: '1.0.0'
  description: >-
    Soft-deletes a memory chunk, marking it inactive and removing associated links while preserving
    audit history. The memory remains in the database but is excluded from searches and retrieval.
  one_liner: 'Deactivate a memory chunk (soft delete) while preserving audit history.'
  invocation_context: >-
    Use when a memory is no longer relevant or should be hidden. This is a soft delete—the memory
    remains in the database but is marked inactive. System/operator can delete any memory; users
    can only delete their own episodic memories.
  agent_hint: 'User requests to remove or delete stored information.'
  pattern: external_api
  tags:
    - memory
    - delete
    - deactivation
    - runtime
  availability:
    - production
    - staging
  auth:
    policy_notes: >-
      Permission checks: System/operator can delete any memory. Users can only delete their own
      episodic memories. Agents and integrations cannot delete memories.
  constraints:
    max_duration_seconds: 3
    rate_limit_per_minute: 30
    note: 'This is a soft delete. Memory links are removed. Reason is optional but recommended.'
  input_schema:
    type: object
    additionalProperties: false
    properties:
      memoryId:
        type: string
        minLength: 1
        description: 'ID of the memory chunk to delete.'
      actor:
        type: object
        properties:
          type:
            type: string
            enum:
              - system
              - agent
              - user
              - integration
              - operator
          id:
            type: string
            minLength: 1
          scopes:
            type: array
            maxItems: 20
            items:
              type: string
              minLength: 1
        required:
          - type
          - id
        description: 'Actor making the delete request.'
      reason:
        type: string
        maxLength: 280
        description: 'Optional reason for deletion (preserved in audit history).'
      force:
        type: boolean
        description: 'Force delete (for system/operator only).'
    required:
      - memoryId
      - actor
  output_schema:
    type: object
    additionalProperties: false
    properties:
      memoryId:
        type: string
      status:
        type: string
        enum:
          - inactive
      deletedAt:
        type: string
        format: date-time
    required:
      - memoryId
      - status
      - deletedAt
  versioning:
    last_updated: '2025-11-02'
    owner_team: memory_platform
    contact: 'slack://#memory-platform'
  examples:
    - name: Delete obsolete memory
      description: 'Soft-delete a memory that is no longer relevant.'
      input:
        memoryId: 'memory-abc123'
        reason: 'Information outdated, replaced by memory-xyz789'
        actor:
          type: system
          id: 'system-ops'
      output:
        memoryId: 'memory-abc123'
        status: inactive
        deletedAt: '2025-11-02T12:00:00Z'

