tool:
  id: myloware.prompts.prompt_list.v1
  name: prompt_list
  namespace: myloware.prompts
  version: '1.0.0'
  description: >-
    Builds a bird's-eye map of the prompt library with rich metadata in one call. Filter by persona,
    project, or combination type to see exactly what content exists and when it was last updated.
    Perfect for loading every project slug before a conversation or auditing coverage across personas.
  one_liner: 'List available prompts with optional filters by persona, project, or type.'
  invocation_context: >-
    Use when you need to discover what prompts exist in the system, especially before a conversation
    starts. Do not use to fetch full prompt content; use prompt_get for that. Do not use for semantic
    search; use prompt_search instead.
  agent_hint: 'User asks "what prompts are available" or needs to audit prompt coverage.'
  pattern: structured_data_retrieval
  tags:
    - prompts
    - listing
    - discovery
    - metadata
  availability:
    - production
    - staging
  constraints:
    max_duration_seconds: 2
    rate_limit_per_minute: 60
  input_schema:
    type: object
    additionalProperties: false
    properties:
      persona:
        type: string
        description: 'Filter by persona name (slug-normalized).'
      project:
        type: string
        description: 'Filter by project name (slug-normalized).'
      type:
        type: string
        enum:
          - persona
          - project
          - combination
        description: 'Filter by prompt type: persona-only, project-only, or combination prompts.'
  output_schema:
    type: object
    additionalProperties: false
    properties:
      prompts:
        type: array
        items:
          type: object
          properties:
            promptKey:
              type: string
            metadata:
              type: object
            chunkCount:
              type: integer
            updatedAt:
              type: string
              nullable: true
          required:
            - promptKey
            - metadata
            - chunkCount
            - updatedAt
      appliedFilters:
        type: object
        properties:
          persona:
            type: string
            nullable: true
          project:
            type: string
            nullable: true
          type:
            type: string
            nullable: true
        required:
          - persona
          - project
          - type
    required:
      - prompts
      - appliedFilters
  versioning:
    last_updated: '2025-11-02'
    owner_team: prompt_platform
    contact: 'slack://#prompt-platform'
  examples:
    - name: List all prompts
      description: 'Get all available prompts without filters.'
      input: {}
      output:
        prompts:
          - promptKey: 'persona::screenwriter'
            metadata:
              persona:
                - screenwriter
            chunkCount: 3
            updatedAt: '2025-10-15T12:00:00Z'
        appliedFilters:
          persona: null
          project: null
          type: null

