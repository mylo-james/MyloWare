tool:
  id: myloware.prompts.prompt_search.v1
  name: prompt_search
  namespace: myloware.prompts
  version: '1.0.0'
  description: >-
    Swiss-army retrieval across the entire prompt corpus: vector, keyword, or hybrid modes in one tool.
    Layer on persona/project filters, temporal decay, graph expansion, and memory routing to surface
    the most relevant snippets. Returns ranked chunks with previews, similarity scores, and diagnostics
    so you know why each result appeared.
  one_liner: 'Semantic/keyword/hybrid search across prompt corpus with advanced filtering options.'
  invocation_context: >-
    Use for semantic search across prompts. Supports automatic query enhancement, memory routing, graph
    expansion, and temporal decay. Use prompt_get if you already know the exact persona/project. Use
    prompt_list if you only need metadata without content.
  agent_hint: 'User asks questions or needs to find relevant prompt content by meaning.'
  pattern: knowledge_base
  tags:
    - prompts
    - search
    - semantic
    - vector
    - keyword
    - hybrid
  availability:
    - production
    - staging
  constraints:
    max_duration_seconds: 5
    rate_limit_per_minute: 60
    max_items: 50
    note: >-
      Default limit is 10. Default minSimilarity varies by mode (0.3 for vector, 0 for keyword/hybrid).
      Graph expansion limited to 5 hops. Auto-filter enabled by default.
  input_schema:
    type: object
    additionalProperties: false
    properties:
      query:
        type: string
        minLength: 1
        description: 'Search query string.'
      persona:
        type: string
        description: 'Filter by persona name (slug-normalized).'
      project:
        type: string
        description: 'Filter by project name (slug-normalized).'
      limit:
        type: integer
        minimum: 1
        maximum: 50
        default: 10
        description: 'Maximum number of results to return.'
      minSimilarity:
        type: number
        minimum: 0
        maximum: 1
        description: 'Minimum similarity threshold (defaults vary by search mode).'
      searchMode:
        type: string
        enum:
          - vector
          - keyword
          - hybrid
        default: hybrid
        description: 'Search mode: vector (semantic), keyword (fulltext), or hybrid (both combined).'
      autoFilter:
        type: boolean
        default: true
        description: 'Enable automatic persona/project extraction from query.'
      useMemoryRouting:
        type: boolean
        description: 'Enable memory component routing (persona/project/semantic/episodic/procedural).'
      expandGraph:
        type: boolean
        description: 'Enable graph expansion to find related chunks via memory links.'
      graphMaxHops:
        type: integer
        minimum: 1
        maximum: 5
        description: 'Maximum graph traversal hops (default: 2).'
      graphMinLinkStrength:
        type: number
        minimum: 0
        maximum: 1
        description: 'Minimum link strength for graph traversal.'
      temporalBoost:
        type: boolean
        description: 'Enable temporal decay to favor recent content.'
      temporalConfig:
        type: object
        properties:
          strategy:
            type: string
            enum:
              - exponential
              - linear
              - none
          halfLifeDays:
            type: number
            minimum: 0
          maxAgeDays:
            type: number
            minimum: 0
        description: 'Temporal decay configuration (overrides defaults).'
    required:
      - query
  output_schema:
    type: object
    additionalProperties: false
    properties:
      matches:
        type: array
        items:
          type: object
          properties:
            chunkId:
              type: string
            promptKey:
              type: string
            similarity:
              type: number
            metadata:
              type: object
            preview:
              type: string
            ageDays:
              type: number
              nullable: true
            temporalDecayApplied:
              type: boolean
            memoryComponent:
              type: string
              enum:
                - persona
                - project
                - semantic
                - episodic
                - procedural
            originalSimilarity:
              type: number
            routeWeight:
              type: number
            graphContext:
              type: object
              properties:
                seedChunkId:
                  type: string
                hopCount:
                  type: integer
                linkStrength:
                  type: number
                seedSimilarity:
                  type: number
                seedContribution:
                  type: number
                linkContribution:
                  type: number
                path:
                  type: array
                  items:
                    type: object
          required:
            - chunkId
            - promptKey
            - similarity
            - metadata
            - preview
            - memoryComponent
      appliedFilters:
        type: object
        properties:
          persona:
            type: string
            nullable: true
          project:
            type: string
            nullable: true
          limit:
            type: integer
          minSimilarity:
            type: number
          mode:
            type: string
            enum:
              - vector
              - keyword
              - hybrid
          searchMode:
            type: string
            enum:
              - auto
              - manual
          auto:
            type: boolean
          autoDetails:
            type: array
            items:
              type: string
          temporalDecayApplied:
            type: boolean
          temporalConfig:
            type: object
          graphExpansion:
            type: object
          memoryRouting:
            type: boolean
          componentsSearched:
            type: array
            items:
              type: string
          routingDecision:
            type: object
        required:
          - persona
          - project
          - limit
          - minSimilarity
          - mode
          - searchMode
          - auto
          - temporalDecayApplied
          - graphExpansion
          - memoryRouting
      graph:
        type: object
        nullable: true
        properties:
          nodes:
            type: array
            items:
              type: object
          edges:
            type: array
            items:
              type: object
    required:
      - matches
      - appliedFilters
      - graph
  versioning:
    last_updated: '2025-11-02'
    owner_team: prompt_platform
    contact: 'slack://#prompt-platform'
  examples:
    - name: Hybrid search with auto-filter
      description: 'Search with automatic persona/project extraction.'
      input:
        query: 'screenwriter persona workflow'
        searchMode: hybrid
        limit: 5
      output:
        matches:
          - chunkId: 'chunk-123'
            promptKey: 'persona::screenwriter'
            similarity: 0.87
            metadata:
              persona:
                - screenwriter
            preview: 'You are a screenwriter...'
            memoryComponent: persona
        appliedFilters:
          persona: screenwriter
          project: null
          limit: 5
          mode: hybrid
          searchMode: auto
          auto: true

