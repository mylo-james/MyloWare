tool:
  id: myloware.prompts.prompt_get.v1
  name: prompt_get
  namespace: myloware.prompts
  version: '1.0.0'
  description: >-
    Fetches the canonical prompt document—complete with markdown content and metadata—for a given
    persona or project. Pass persona_name, project_name, or both to disambiguate overlapping prompts,
    and receive resolution diagnostics along the way. Ideal for loading an AI Agent persona's system
    prompt before answering a user.
  one_liner: 'Resolve and fetch a prompt document by persona or project metadata.'
  invocation_context: >-
    Use when you need the full prompt content for a specific persona or project. This tool resolves
    ambiguity when multiple prompts exist. Do not use for searching or listing prompts; use prompt_search
    or prompt_list instead.
  agent_hint: 'User mentions a specific persona or project name and needs the prompt content.'
  pattern: structured_data_retrieval
  tags:
    - prompts
    - retrieval
    - persona
    - project
  availability:
    - production
    - staging
  constraints:
    max_duration_seconds: 3
    rate_limit_per_minute: 60
    note: 'Resolves ambiguity by exact match. Returns null if no match found.'
  input_schema:
    type: object
    additionalProperties: false
    properties:
      project_name:
        type: string
        minLength: 1
        description: 'Project name to filter by (slug-normalized).'
      persona_name:
        type: string
        minLength: 1
        description: 'Persona name to filter by (slug-normalized).'
    oneOf:
      - required:
          - project_name
      - required:
          - persona_name
      - required:
          - project_name
          - persona_name
  output_schema:
    type: object
    additionalProperties: false
    properties:
      prompt:
        type: object
        nullable: true
        properties:
          promptKey:
            type: string
          content:
            type: string
          metadata:
            type: object
          updatedAt:
            type: string
            nullable: true
      resolution:
        type: object
        properties:
          project:
            type: string
            nullable: true
          persona:
            type: string
            nullable: true
          strategy:
            type: string
            enum:
              - exact
              - persona_only
              - project_only
            nullable: true
          analyzedMatches:
            type: integer
        required:
          - project
          - persona
          - strategy
          - analyzedMatches
      candidates:
        type: array
        items:
          type: object
          properties:
            promptKey:
              type: string
            metadata:
              type: object
            updatedAt:
              type: string
              nullable: true
    required:
      - prompt
      - resolution
      - candidates
  versioning:
    last_updated: '2025-11-02'
    owner_team: prompt_platform
    contact: 'slack://#prompt-platform'
  examples:
    - name: Get persona prompt
      description: 'Fetch prompt for a specific persona.'
      input:
        persona_name: 'screenwriter'
      output:
        prompt:
          promptKey: 'persona::screenwriter'
          content: '# Screenwriter Persona\n\nYou are a screenwriter...'
          metadata:
            persona:
              - screenwriter
          updatedAt: '2025-10-15T12:00:00Z'
        resolution:
          project: null
          persona: screenwriter
          strategy: persona_only
          analyzedMatches: 1
        candidates:
          - promptKey: 'persona::screenwriter'
            metadata:
              persona:
                - screenwriter
            updatedAt: '2025-10-15T12:00:00Z'

