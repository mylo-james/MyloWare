tool:
  id: myloware.prompts.prompts_search_adaptive.v1
  name: prompts_search_adaptive
  namespace: myloware.prompts
  version: '1.0.0'
  description: >-
    Runs the adaptive retrieval controller to decide if and how to search for prompts. Supports iterative
    refinement, hybrid search modes, multi-hop expansion, and telemetry for each iteration. Use when a
    query may require multiple retrieval passes or confidence scoring. The tool evaluates utility at each
    iteration and decides whether to continue searching or return results.
  one_liner: 'Adaptive iterative prompt search with utility-based decision making.'
  invocation_context: >-
    Use when queries are ambiguous or may require multiple search passes to achieve sufficient recall.
    The tool automatically evaluates whether enough information has been retrieved and can iterate up to
    maxIterations times. Use prompt_search for simpler single-pass searches.
  agent_hint: 'Complex query or ambiguous information need that may require multiple search attempts.'
  pattern: knowledge_base
  tags:
    - prompts
    - search
    - adaptive
    - iterative
    - reasoning_helper
  availability:
    - production
    - staging
  constraints:
    max_duration_seconds: 30
    rate_limit_per_minute: 20
    max_items: 50
    note: >-
      Default timeout is 30 seconds. Max iterations is 5 (default: 3). Each iteration evaluates utility
      and may trigger another search pass. Multi-hop expansion limited to 5 hops.
  input_schema:
    type: object
    additionalProperties: false
    properties:
      query:
        type: string
        minLength: 1
        description: 'Search query string.'
      summary:
        type: string
        description: 'Summary of information already known (helps assess utility).'
      context:
        type: string
        description: 'Additional context about the information need.'
      knownFacts:
        type: array
        maxItems: 20
        items:
          type: string
          minLength: 1
        description: 'Known facts that should not be retrieved again.'
      missingInformation:
        type: array
        maxItems: 20
        items:
          type: string
          minLength: 1
        description: 'Information gaps that need to be filled.'
      ambiguitySignals:
        type: array
        maxItems: 20
        items:
          type: string
          minLength: 1
        description: 'Signals indicating query ambiguity.'
      safetyCritical:
        type: boolean
        description: 'Whether this query is safety-critical (affects utility scoring).'
      lastRetrievedAt:
        type: string
        format: date-time
        description: 'ISO 8601 timestamp of last retrieval (for freshness assessment).'
      intent:
        type: string
        enum:
          - persona_lookup
          - project_lookup
          - combination_lookup
          - general_knowledge
          - workflow_step
          - example_request
        description: 'Query intent classification.'
      persona:
        type: string
        description: 'Filter by persona name.'
      project:
        type: string
        description: 'Filter by project name.'
      memoryTypes:
        type: array
        items:
          type: string
          enum:
            - persona
            - project
            - semantic
            - episodic
            - procedural
        description: 'Memory component types to search.'
      keywords:
        type: array
        maxItems: 20
        items:
          type: string
          minLength: 1
        description: 'Keywords to boost in search.'
      temporalFocus:
        type: string
        enum:
          - recent
          - historical
          - any
        description: 'Temporal focus preference.'
      maxIterations:
        type: integer
        minimum: 1
        maximum: 5
        default: 3
        description: 'Maximum number of search iterations.'
      utilityThreshold:
        type: number
        minimum: 0
        maximum: 1
        description: 'Utility threshold for stopping iteration early.'
      limit:
        type: integer
        minimum: 1
        maximum: 50
        description: 'Maximum results per iteration.'
      minSimilarity:
        type: number
        minimum: 0
        maximum: 1
        description: 'Minimum similarity threshold.'
      initialMode:
        type: string
        enum:
          - vector
          - keyword
          - hybrid
        description: 'Initial search mode for first iteration.'
      searchModes:
        type: array
        minItems: 1
        maxItems: 3
        items:
          type: string
          enum:
            - vector
            - keyword
            - hybrid
        description: 'Search modes to try across iterations.'
      enableMultiHop:
        type: boolean
        description: 'Enable multi-hop graph expansion.'
      maxHops:
        type: integer
        minimum: 0
        maximum: 5
        description: 'Maximum hops for multi-hop expansion.'
      multiHopMaxResultsPerHop:
        type: integer
        minimum: 1
        maximum: 10
        description: 'Maximum results per hop in multi-hop search.'
    required:
      - query
  output_schema:
    type: object
    additionalProperties: false
    properties:
      decision:
        type: object
        properties:
          decision:
            type: string
            enum:
              - yes
              - no
              - maybe
          confidence:
            type: number
            minimum: 0
            maximum: 1
          rationale:
            type: string
          safetyOverride:
            type: boolean
          metrics:
            type: object
            properties:
              knowledgeSufficiency:
                type: number
              freshnessRisk:
                type: number
              ambiguity:
                type: number
        required:
          - decision
          - confidence
          - rationale
          - safetyOverride
          - metrics
      retrieved:
        type: boolean
        description: 'Whether retrieval was performed.'
      finalUtility:
        type: number
        description: 'Final utility score after all iterations.'
      totalDurationMs:
        type: number
        description: 'Total duration in milliseconds.'
      iterations:
        type: array
        items:
          type: object
          properties:
            iteration:
              type: integer
            query:
              type: string
            searchMode:
              type: string
              enum:
                - vector
                - keyword
                - hybrid
                - multi-hop
            utility:
              type: number
            durationMs:
              type: number
            notes:
              type: array
              items:
                type: string
            resultCount:
              type: integer
          required:
            - iteration
            - query
            - searchMode
            - utility
            - durationMs
            - notes
            - resultCount
      results:
        type: array
        items:
          type: object
          properties:
            chunkId:
              type: string
            promptKey:
              type: string
            preview:
              type: string
            similarity:
              type: number
            metadata:
              type: object
            memoryType:
              type: string
              enum:
                - persona
                - project
                - semantic
                - episodic
                - procedural
            foundAtIteration:
              type: integer
            searchMode:
              type: string
            aggregatedScore:
              type: number
            route:
              type: array
              items:
                type: string
            hop:
              type: integer
          required:
            - chunkId
            - promptKey
            - preview
            - similarity
            - metadata
            - memoryType
            - foundAtIteration
            - searchMode
    required:
      - decision
      - retrieved
      - finalUtility
      - totalDurationMs
      - iterations
      - results
  versioning:
    last_updated: '2025-11-02'
    owner_team: prompt_platform
    contact: 'slack://#prompt-platform'
  examples:
    - name: Adaptive search with iteration
      description: 'Search that requires multiple iterations to achieve sufficient utility.'
      input:
        query: 'screenwriter workflow for short-form video'
        maxIterations: 3
        utilityThreshold: 0.7
      output:
        decision:
          decision: yes
          confidence: 0.82
          rationale: 'Sufficient information retrieved after 2 iterations.'
          safetyOverride: false
          metrics:
            knowledgeSufficiency: 0.85
            freshnessRisk: 0.15
            ambiguity: 0.2
        retrieved: true
        finalUtility: 0.82
        totalDurationMs: 1250
        iterations:
          - iteration: 1
            query: 'screenwriter workflow for short-form video'
            searchMode: hybrid
            utility: 0.65
            durationMs: 420
            notes:
              - 'Initial search returned 8 results'
            resultCount: 8
          - iteration: 2
            query: 'screenwriter workflow for short-form video'
            searchMode: hybrid
            utility: 0.82
            durationMs: 380
            notes:
              - 'Refined search increased utility'
            resultCount: 12
        results:
          - chunkId: 'chunk-123'
            promptKey: 'persona::screenwriter'
            preview: 'You are a screenwriter...'
            similarity: 0.89
            metadata:
              persona:
                - screenwriter
            memoryType: persona
            foundAtIteration: 1
            searchMode: hybrid

